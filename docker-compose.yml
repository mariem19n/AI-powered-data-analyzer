# ============================================================
# AI-Powered Data Analyzer — Docker Compose
# Services : FastAPI, PostgreSQL, Neo4j, Redis
# ============================================================

services:

  # -----------------------------------------------------------
  # LAYER 2 — API Gateway (FastAPI)
  # -----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analyzer-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_secret}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./app:/app/app          # Hot-reload en dev
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - analyzer-net
    restart: unless-stopped

  # -----------------------------------------------------------
  # LAYER 6 — PostgreSQL (Source de données)
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: analyzer-postgres
    ports:
      - "5433:5432"  # Expose sur 5433 pour éviter les conflits locaux
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyzer -d analyzer_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - analyzer-net
    restart: unless-stopped

  # -----------------------------------------------------------
  # LAYER 6 — Neo4j (Knowledge Graph)
  # -----------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: analyzer-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j_secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - analyzer-net
    restart: unless-stopped

  # -----------------------------------------------------------
  # LAYER 6 — Redis (Cache & Sessions)
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: analyzer-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - analyzer-net
    restart: unless-stopped

# =============================================================
# Volumes persistants
# =============================================================
volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  redis_data:
    driver: local

# =============================================================
# Réseau partagé entre tous les services
# =============================================================
networks:
  analyzer-net:
    driver: bridge
    name: analyzer-network